<!DOCTYPE html>
<html lang="en">
    <head>
      <!-- Google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Oxygen+Mono&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Post to an API</title>
      <link rel="stylesheet" href="./index.css">
    </head>
    <body>
      <div class="container" id="container">
        <form id="formLogin">
          <h1>Application Form</h1>
          <div class="input-wrapper" id="input-wrapper">
            <label for="name" id="label-id">First Name</label>
            <input type="text" name="name" id="name">
          </div>

          <div class="input-wrapper" id="input-wrapper">
            <label for="surname" id="label-id">Surname</label>
            <input type="text" name="surname" id="surname">
          </div>

          <div class="input-wrapper" id="input-wrapper">
            <label for="email" id="label-id">Email</label>
            <input type="email" name="email" id="email">
          </div>

          <div class="input-wrapper" id="input-wrapper">
            <label for="password" id="label-id">Password</label>
            <input type="password" name="password" id="password">
          </div>

          <input type="file" name="file" id="file">

          <button id="submit" class="submit-btn">Submit</button>
        </form>
        <div class="post" id="post"></div>
      </div>
      
      <script src="./index.js"></script>
    </body>
</html>
